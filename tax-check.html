<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>決算整合性チェック｜グロースリンク税理士法人 亀戸オフィス</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', 'Hiragino Sans', 'Meiryo', sans-serif; background: #f0f4f9; min-height: 100vh; }
.wrap { padding: 16px; max-width: 1060px; margin: 0 auto; }
.header { background: linear-gradient(135deg, #1a3a6b 0%, #2a5298 100%); color: #fff; border-radius: 12px 12px 0 0; padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(26,58,107,.3); flex-wrap: wrap; }
.header h1 { font-size: 17px; font-weight: 700; }
.header small { font-size: 10px; opacity: 0.7; letter-spacing: 1px; display: block; margin-bottom: 4px; }
.card { background: #fff; border-radius: 0 0 12px 12px; padding: 24px 20px 28px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
.section-title { font-size: 13px; font-weight: 700; color: #1a3a6b; border-left: 4px solid #2a5298; padding-left: 10px; margin: 24px 0 14px; letter-spacing: 0.3px; }
.section-title:first-of-type { margin-top: 0; }
.btn { border: none; border-radius: 8px; padding: 10px 20px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit; }
.btn:hover { opacity: 0.92; }
.btn-navy { background: #1a3a6b; color: #fff; }
.btn-white { background: #fff; color: #1a3a6b; }

.guide-banner { background: #fffef0; border: 1px solid #e6c800; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 12px; color: #5d4037; line-height: 1.9; }
.guide-banner strong { color: #1a3a6b; }
.guide-steps { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.guide-step { background: linear-gradient(135deg,#1a3a6b,#2a5298); color: #fff; border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 700; white-space: nowrap; }
.guide-step span { opacity: 0.7; margin-right: 4px; }

/* Upload */
.upload-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 8px; }
@media (max-width: 700px) { .upload-grid { grid-template-columns: 1fr; } }
.upload-box { background: #f7f9fc; border: 2px dashed #b8c4d8; border-radius: 10px; padding: 20px 14px; text-align: center; cursor: pointer; transition: all .2s; position: relative; min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
.upload-box:hover, .upload-box.dragover { border-color: #1a3a6b; background: #eef2fa; }
.upload-box.loaded { border-color: #2e7d32; border-style: solid; background: #f1f8f1; }
.upload-box .icon { font-size: 28px; }
.upload-box .label { font-size: 13px; font-weight: 700; color: #1a3a6b; }
.upload-box .status { font-size: 11px; color: #888; }
.upload-box.loaded .status { color: #2e7d32; font-weight: 700; }
.upload-box input { display: none; }

/* Parsed data */
.parsed-section { margin-top: 14px; }
.parsed-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 14px; }
.parsed-table th { background: #e8edf5; color: #1a3a6b; font-size: 11px; padding: 6px 8px; text-align: left; border: 1px solid #dde3ee; white-space: nowrap; }
.parsed-table td { padding: 5px 8px; border: 1px solid #dde3ee; }
.parsed-table td.num { text-align: right; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 12px; }
.parsed-table tr:nth-child(even) { background: #fafbfd; }
.parsed-table tr.subtotal { background: #e8edf5; font-weight: 700; }
.parsed-table .source-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 700; margin-right: 4px; }
.tag-bs { background: #e3f2fd; color: #1565c0; }
.tag-pl { background: #fff3e0; color: #e65100; }
.tag-detail { background: #f3e5f5; color: #7b1fa2; }
.tag-ledger { background: #e8f5e9; color: #2e7d32; }
.toggle-btn { background: #e8edf5; border: 1px solid #ccd3e0; border-radius: 6px; padding: 5px 12px; font-size: 11px; font-weight: 700; color: #1a3a6b; cursor: pointer; margin-bottom: 8px; }
.toggle-btn:hover { background: #c5d0e8; }

/* Run */
.run-area { display: flex; justify-content: center; gap: 12px; margin: 20px 0 12px; }
.btn-run { background: linear-gradient(135deg,#1a3a6b,#2a5298); color: #fff; padding: 14px 36px; font-size: 15px; border-radius: 10px; box-shadow: 0 4px 12px rgba(26,58,107,.3); }

/* Results */
.result-summary { background: linear-gradient(135deg,#f0f4f9,#e8edf5); border-radius: 10px; padding: 16px 20px; border: 1px solid #dde3ee; margin-bottom: 14px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
.result-summary-main { font-size: 18px; font-weight: 700; color: #1a3a6b; flex: 1; }
.result-pill { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; }
.result-pill.ok { background: #e8f5e9; color: #2e7d32; }
.result-pill.ng { background: #fdecea; color: #c62828; }
.result-category { font-size: 13px; font-weight: 700; color: #1a3a6b; margin: 18px 0 8px; padding-left: 10px; border-left: 3px solid #2a5298; }
.check-item { background: #fff; border: 1px solid #dde3ee; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; display: grid; grid-template-columns: 36px 1fr; gap: 10px; align-items: start; }
.check-item.ok { border-left: 4px solid #2e7d32; background: #f6faf6; }
.check-item.ng { border-left: 4px solid #c62828; background: #fdf3f2; }
.check-mark { font-size: 20px; font-weight: 700; text-align: center; padding-top: 2px; }
.check-mark.ok { color: #2e7d32; }
.check-mark.ng { color: #c62828; }
.check-title { font-size: 12px; font-weight: 700; color: #222; margin-bottom: 2px; }
.check-detail { font-size: 11px; color: #555; line-height: 1.6; }
.check-detail .diff { font-weight: 700; color: #c62828; }
.check-detail .match { font-weight: 700; color: #2e7d32; }
.check-sub-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 6px; }
.check-sub-table th { background: #f0f4f9; padding: 3px 6px; text-align: left; border: 1px solid #e0e0e0; font-weight: 700; color: #555; }
.check-sub-table td { padding: 3px 6px; border: 1px solid #e0e0e0; }
.check-sub-table td.num { text-align: right; font-family: 'SF Mono', Menlo, Consolas, monospace; }
.check-sub-table tr.mismatch td { background: #fdecea; }

/* Loading */
.loading { text-align: center; padding: 20px; color: #888; font-size: 13px; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #dde3ee; border-top-color: #1a3a6b; border-radius: 50%; animation: spin .8s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div>
      <small>GROWTHLINK TAX ACCOUNTING CORPORATION</small>
      <h1>決算書類 整合性チェック</h1>
    </div>
    <button class="btn btn-white" onclick="runChecks()" id="run-btn" disabled>▶ チェック実行</button>
  </div>
  <div class="card">
    <div class="guide-banner">
      <strong>📋 使い方</strong>
      <div class="guide-steps">
        <div class="guide-step"><span>①</span>3つのPDFをアップロード</div>
        <div class="guide-step"><span>②</span>抽出結果を確認</div>
        <div class="guide-step"><span>③</span>▶ チェック実行</div>
        <div class="guide-step"><span>④</span>差異を確認</div>
      </div>
      <div style="margin-top:6px;font-size:11px;color:#888;">※ PDFは会計ソフトの「印刷→PDF保存」で出力したテキスト形式に対応。画像PDFは読み取れません。</div>
    </div>

    <div class="section-title">① PDFアップロード</div>
    <div class="upload-grid">
      <div class="upload-box" id="drop-kessan" onclick="this.querySelector('input').click()" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="handleDrop(event,'kessan')">
        <input type="file" accept="application/pdf" onchange="handleFile(event,'kessan')">
        <div class="icon">📊</div>
        <div class="label">決算報告書</div>
        <div class="status" id="status-kessan">クリック or ドラッグ</div>
      </div>
      <div class="upload-box" id="drop-uchiwake" onclick="this.querySelector('input').click()" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="handleDrop(event,'uchiwake')">
        <input type="file" accept="application/pdf" onchange="handleFile(event,'uchiwake')">
        <div class="icon">📑</div>
        <div class="label">科目内訳書</div>
        <div class="status" id="status-uchiwake">クリック or ドラッグ</div>
      </div>
      <div class="upload-box" id="drop-motochou" onclick="this.querySelector('input').click()" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="handleDrop(event,'motochou')">
        <input type="file" accept="application/pdf" onchange="handleFile(event,'motochou')">
        <div class="icon">📒</div>
        <div class="label">総勘定元帳</div>
        <div class="status" id="status-motochou">クリック or ドラッグ</div>
      </div>
    </div>

    <div id="parsed-area"></div>
    <div id="check-results"></div>
  </div>
</div>

<script>
/* ============================================================
   State
   ============================================================ */
const state = { kessan: null, uchiwake: null, motochou: null };

/* ============================================================
   PDF.js Loader
   ============================================================ */
let pdfjsReady = null;
function loadPdfJs() {
  if (window.pdfjsLib) return Promise.resolve();
  if (pdfjsReady) return pdfjsReady;
  pdfjsReady = new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      res();
    };
    s.onerror = () => rej(new Error('PDF.js の読込に失敗'));
    document.head.appendChild(s);
  });
  return pdfjsReady;
}

async function extractText(file) {
  await loadPdfJs();
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const pages = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    let lines = [];
    let lastY = null;
    let curLine = [];
    for (const item of content.items) {
      const y = Math.round(item.transform[5]);
      if (lastY !== null && Math.abs(y - lastY) > 3) {
        lines.push(curLine);
        curLine = [];
      }
      curLine.push({ str: item.str, x: Math.round(item.transform[4]), y });
      lastY = y;
    }
    if (curLine.length) lines.push(curLine);
    pages.push(lines);
  }
  return pages;
}

function pageLinesToText(pages) {
  return pages.map(lines =>
    lines.map(items => items.map(i => i.str).join(' ')).join('\n')
  ).join('\n--- PAGE ---\n');
}

/* ============================================================
   File Handling
   ============================================================ */
function handleDrop(e, type) {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') processFile(file, type);
}
function handleFile(e, type) {
  const file = e.target.files[0];
  if (file) processFile(file, type);
}

async function processFile(file, type) {
  const box = document.getElementById('drop-' + type);
  const status = document.getElementById('status-' + type);
  status.textContent = '⏳ 読取中...';
  box.classList.remove('loaded');
  try {
    const pages = await extractText(file);
    const text = pageLinesToText(pages);
    let parsed;
    if (type === 'kessan') parsed = parseKessan(text, pages);
    else if (type === 'uchiwake') parsed = parseUchiwake(text, pages);
    else parsed = parseMotochou(text, pages);
    state[type] = parsed;
    status.textContent = '✅ ' + file.name;
    box.classList.add('loaded');
    renderParsed();
    updateRunBtn();
  } catch (err) {
    status.textContent = '❌ ' + err.message;
    console.error(err);
  }
}

function updateRunBtn() {
  const btn = document.getElementById('run-btn');
  const count = [state.kessan, state.uchiwake, state.motochou].filter(Boolean).length;
  btn.disabled = count < 2;
  btn.textContent = count < 2 ? `▶ チェック実行（${count}/3 読込済）` : '▶ チェック実行';
}

/* ============================================================
   Number utilities
   ============================================================ */
function parseNum(s) {
  if (!s) return 0;
  s = String(s).replace(/[,，　\s]/g, '').replace(/△/g, '-');
  const m = s.match(/-?[\d]+/);
  return m ? parseInt(m[0], 10) : 0;
}
function fmt(n) {
  if (n == null || isNaN(n)) return '-';
  return n.toLocaleString('ja-JP');
}
function cleanName(s) {
  return s.replace(/[\s　]+/g, '').replace(/[【】\[\]]/g, '').trim();
}

/* ============================================================
   決算報告書 Parser
   ============================================================ */
function parseKessan(text) {
  const bs = [], pl = [], plDetail = [];
  const lines = text.split('\n');
  let section = '';

  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i];
    const line = raw.trim();
    if (!line) continue;

    if (/資産の部/.test(line) && !/負債/.test(line)) { section = 'bs'; continue; }
    if (/損\s*益\s*計\s*算\s*書/.test(line)) { section = 'pl'; continue; }
    if (/販売費及び一般管理費内訳/.test(line)) { section = 'plDetail'; continue; }
    if (/株\s*主\s*資\s*本\s*等\s*変\s*動/.test(line)) { section = ''; continue; }
    if (/個\s*別\s*注\s*記\s*表/.test(line)) { section = ''; continue; }

    const numMatch = line.match(/(-?[\d,]+)\s*$/);
    if (!numMatch) continue;
    const amount = parseNum(numMatch[1]);
    let name = line.slice(0, numMatch.index).trim();
    name = cleanName(name);
    if (!name || /^[\d,\-]+$/.test(name) || /^（/.test(name)) continue;

    if (section === 'bs') bs.push({ name, amount });
    else if (section === 'pl') pl.push({ name, amount });
    else if (section === 'plDetail') plDetail.push({ name, amount });
  }

  return { bs, pl, plDetail };
}

/* ============================================================
   科目内訳書 Parser
   ============================================================ */
function parseUchiwake(text) {
  const items = [];
  const lines = text.split('\n');
  let currentForm = '';

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();

    const formMatch = line.match(/(売掛金|未収入金|仮払金|前渡金|棚卸資産|買掛金|未払金|未払費用|未払法人税|借入金|地代家賃|役員給与|工業所有権|貸付金|仮受金|源泉)/);
    if (formMatch && /内訳/.test(line)) {
      currentForm = cleanName(formMatch[0]);
    }

    if (/人\s*件\s*費\s*の\s*内\s*訳/.test(line)) currentForm = '人件費';

    const totalMatch = line.match(/(?:小?\s*計|合\s*計)\s+(-?[\d,]+)/);
    if (totalMatch && currentForm) {
      const amount = parseNum(totalMatch[1]);
      items.push({ form: currentForm, name: currentForm, amount, type: 'total' });
    }

    if (currentForm === '役員給与' || currentForm === '人件費') {
      const numMatch = line.match(/(-?[\d,]+)\s*$/);
      if (numMatch) {
        const amount = parseNum(numMatch[1]);
        const name = cleanName(line.slice(0, numMatch.index));
        if (/役員給与計|役員給与/.test(name) && amount > 0) {
          items.push({ form: '役員給与', name: '役員給与計', amount, type: 'detail' });
        }
        if (/給与手当/.test(name) && amount > 0) {
          items.push({ form: '人件費', name: '給与手当', amount, type: 'detail' });
        }
      }
    }

    if (currentForm && /計\s/.test(line)) {
      const parts = line.match(/([^\d]*?)\s+(-?[\d,]+)/);
      if (parts) {
        const lbl = cleanName(parts[1]);
        if (/^計$/.test(lbl) || /^小計$/.test(lbl)) {
          // already handled
        }
      }
    }
  }

  const dedup = [];
  const seen = new Set();
  for (const item of items) {
    const key = item.form + ':' + item.name + ':' + item.amount;
    if (!seen.has(key)) { seen.add(key); dedup.push(item); }
  }
  return dedup;
}

/* ============================================================
   総勘定元帳 Parser
   ============================================================ */
function parseMotochou(text) {
  const accounts = {};
  const lines = text.split('\n');
  let currentAccount = null;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    const headerMatch = line.match(/令和\s*\d+年度\s+(.+?)\s+\d+\s*頁/);
    if (headerMatch) {
      currentAccount = cleanName(headerMatch[1]);
      if (!accounts[currentAccount]) {
        accounts[currentAccount] = { debit: 0, credit: 0 };
      }
      continue;
    }

    if (currentAccount && /当期累計/.test(line)) {
      const nums = line.match(/当期累計\s+([\d,]+)\s+([\d,]+)/);
      if (nums) {
        accounts[currentAccount].debit = parseNum(nums[1]);
        accounts[currentAccount].credit = parseNum(nums[2]);
      }
    }
  }

  return accounts;
}

/* ============================================================
   Render Parsed Data
   ============================================================ */
function renderParsed() {
  const area = document.getElementById('parsed-area');
  let html = '';

  if (state.kessan) {
    html += '<div class="section-title">② 抽出結果：決算報告書</div>';
    html += '<button class="toggle-btn" onclick="toggleTable(\'tbl-bs\')">▼ 貸借対照表</button>';
    html += buildTable('tbl-bs', ['科目', '金額'], state.kessan.bs.map(r => [
      '<span class="source-tag tag-bs">B/S</span>' + esc(r.name), fmt(r.amount)
    ]));
    html += '<button class="toggle-btn" onclick="toggleTable(\'tbl-pl\')">▼ 損益計算書</button>';
    html += buildTable('tbl-pl', ['科目', '金額'], state.kessan.pl.map(r => [
      '<span class="source-tag tag-pl">P/L</span>' + esc(r.name), fmt(r.amount)
    ]));
    if (state.kessan.plDetail.length) {
      html += '<button class="toggle-btn" onclick="toggleTable(\'tbl-pld\')">▼ 販管費内訳</button>';
      html += buildTable('tbl-pld', ['科目', '金額'], state.kessan.plDetail.map(r => [
        '<span class="source-tag tag-pl">販管</span>' + esc(r.name), fmt(r.amount)
      ]));
    }
  }

  if (state.uchiwake) {
    html += '<div class="section-title">② 抽出結果：科目内訳書</div>';
    html += buildTable('tbl-uchi', ['内訳書', '科目', '金額'], state.uchiwake.map(r => [
      '<span class="source-tag tag-detail">内訳</span>' + esc(r.form),
      esc(r.name), fmt(r.amount)
    ]));
  }

  if (state.motochou) {
    html += '<div class="section-title">② 抽出結果：総勘定元帳</div>';
    html += '<button class="toggle-btn" onclick="toggleTable(\'tbl-moto\')">▼ 科目別 当期累計</button>';
    const rows = Object.entries(state.motochou).map(([name, v]) => [
      '<span class="source-tag tag-ledger">元帳</span>' + esc(name),
      fmt(v.debit), fmt(v.credit), fmt(v.debit - v.credit)
    ]);
    html += buildTable('tbl-moto', ['科目', '借方累計', '貸方累計', '差引'], rows);
  }

  area.innerHTML = html;
}

function buildTable(id, headers, rows) {
  let h = `<table class="parsed-table" id="${id}"><thead><tr>`;
  for (const th of headers) h += `<th>${th}</th>`;
  h += '</tr></thead><tbody>';
  for (const row of rows) {
    h += '<tr>';
    for (let i = 0; i < row.length; i++) {
      const cls = (i > 0) ? ' class="num"' : '';
      h += `<td${cls}>${row[i]}</td>`;
    }
    h += '</tr>';
  }
  h += '</tbody></table>';
  return h;
}

function toggleTable(id) {
  const tbl = document.getElementById(id);
  if (tbl) tbl.style.display = tbl.style.display === 'none' ? '' : 'none';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* ============================================================
   Cross-Check Engine
   ============================================================ */
function runChecks() {
  const checks = [];

  // Helper: find BS item by partial name match
  function findBS(keyword) {
    if (!state.kessan) return null;
    return state.kessan.bs.find(r => r.name.includes(keyword));
  }
  function findPL(keyword) {
    if (!state.kessan) return null;
    return state.kessan.pl.find(r => r.name.includes(keyword));
  }
  function findPLD(keyword) {
    if (!state.kessan) return null;
    return state.kessan.plDetail.find(r => r.name.includes(keyword));
  }
  function findUchi(keyword) {
    if (!state.uchiwake) return null;
    return state.uchiwake.find(r => r.name.includes(keyword) && r.type === 'total');
  }
  function findLedger(keyword) {
    if (!state.motochou) return null;
    for (const [name, v] of Object.entries(state.motochou)) {
      if (name.includes(keyword)) return { name, ...v };
    }
    return null;
  }

  // ========================================
  // A: 決算報告書 内部整合
  // ========================================
  if (state.kessan) {
    // A1: 流動資産合計の検算
    const bsItems = state.kessan.bs;
    checkSubtotal(checks, 'A. 決算報告書 内部整合', bsItems,
      '流動資産合計', ['売掛金', '預け金'],
      '流動資産の科目合計が流動資産合計と一致するか');

    // A2: B/S 資産合計 = 負債純資産合計
    const assetTotal = findBS('資産の部合計');
    const liabEquity = findBS('負債及び純資産合計');
    if (assetTotal && liabEquity) {
      checks.push({
        cat: 'A. 決算報告書 内部整合',
        title: '資産合計 = 負債及び純資産合計（貸借一致）',
        items: [
          { label: '資産の部合計', amount: assetTotal.amount },
          { label: '負債及び純資産合計', amount: liabEquity.amount },
        ],
        ok: assetTotal.amount === liabEquity.amount,
      });
    }

    // A3: P/L 販管費合計 = 内訳合計
    if (state.kessan.plDetail.length) {
      const plTotal = state.kessan.plDetail.find(r => r.name.includes('販売費及び一般管理費合計'));
      if (plTotal) {
        const detailSum = state.kessan.plDetail
          .filter(r => !r.name.includes('合計'))
          .reduce((s, r) => s + r.amount, 0);
        checks.push({
          cat: 'A. 決算報告書 内部整合',
          title: '販管費内訳合計 = 販管費合計',
          items: [
            { label: '内訳項目の合計', amount: detailSum },
            { label: '販売費及び一般管理費合計', amount: plTotal.amount },
          ],
          ok: detailSum === plTotal.amount,
        });
      }
    }
  }

  // ========================================
  // B: 決算報告書 ↔ 科目内訳書
  // ========================================
  if (state.kessan && state.uchiwake) {
    const mappings = [
      { bsKey: '売掛金', uchiKey: '売掛金' },
      { bsKey: '未払法人税', uchiKey: '未払法人税' },
      { bsKey: '短期借入金', uchiKey: '借入金' },
      { bsKey: '借入金', uchiKey: '借入金' },
    ];
    for (const m of mappings) {
      const bsItem = findBS(m.bsKey);
      const uchiItem = findUchi(m.uchiKey);
      if (bsItem && uchiItem) {
        checks.push({
          cat: 'B. 決算報告書 ↔ 科目内訳書',
          title: `${bsItem.name}（B/S）= ${uchiItem.form}内訳書 合計`,
          items: [
            { label: 'B/S ' + bsItem.name, amount: bsItem.amount },
            { label: '科目内訳書 計', amount: uchiItem.amount },
          ],
          ok: bsItem.amount === uchiItem.amount,
        });
      }
    }
    // 役員報酬 vs 役員給与内訳
    const yakuinPL = findPLD('役員報酬') || findPL('役員報酬');
    const yakuinUchi = state.uchiwake.find(r => r.name === '役員給与計' || (r.form === '役員給与' && r.type === 'detail'));
    if (yakuinPL && yakuinUchi) {
      checks.push({
        cat: 'B. 決算報告書 ↔ 科目内訳書',
        title: '役員報酬（P/L）= 役員給与等の内訳書',
        items: [
          { label: 'P/L 役員報酬', amount: yakuinPL.amount },
          { label: '内訳書 役員給与計', amount: yakuinUchi.amount },
        ],
        ok: yakuinPL.amount === yakuinUchi.amount,
      });
    }
  }

  // ========================================
  // C: 決算報告書 ↔ 総勘定元帳 (P/L)
  // ========================================
  if (state.kessan && state.motochou) {
    const plItems = state.kessan.plDetail.length ? state.kessan.plDetail : [];
    const plMain = state.kessan.pl || [];

    // P/L detailed items vs ledger
    const plNameMap = {
      '役員報酬': '役員報酬', '福利厚生費': '福利厚生費', '荷造運賃': '荷造運賃',
      '接待交際費': '交際費', '交際費': '交際費', '会議費': '会議費',
      '旅費交通費': '旅費交通費', '通信費': '通信費', '消耗品費': '消耗品費',
      '事務用消耗品費': '事務用品費', '事務用品費': '事務用品費',
      '水道光熱費': '水道光熱費', '新聞図書費': '新聞図書費', '諸会費': '諸会費',
      '支払手数料': '支払手数料', '車両費': '車両費', '地代家賃': '地代家賃',
      '保険料': '保険料', '租税公課': '租税公課', '支払報酬料': '支払報酬料',
      '減価償却費': '減価償却費', '長期前払費用償却': '長期前払費用償却', '雑費': '雑費',
    };

    const detailChecks = [];
    const sourceItems = plItems.filter(r => !r.name.includes('合計'));
    for (const item of sourceItems) {
      const ledgerName = plNameMap[item.name] || item.name;
      const ledger = findLedger(ledgerName);
      if (ledger) {
        const ledgerNet = ledger.debit - ledger.credit;
        detailChecks.push({
          name: item.name,
          kessan: item.amount,
          ledger: ledgerNet,
          ledgerName: ledger.name,
          ok: item.amount === ledgerNet,
        });
      }
    }

    if (detailChecks.length) {
      const allOk = detailChecks.every(d => d.ok);
      checks.push({
        cat: 'C. 決算報告書 ↔ 総勘定元帳（販管費）',
        title: `販管費${detailChecks.length}科目の照合（${detailChecks.filter(d=>d.ok).length}/${detailChecks.length} 一致）`,
        table: {
          headers: ['科目', '決算報告書', '総勘定元帳', '差額'],
          rows: detailChecks.map(d => ({
            cells: [d.name, fmt(d.kessan), fmt(d.ledger), fmt(d.kessan - d.ledger)],
            ok: d.ok,
          })),
        },
        ok: allOk,
      });
    }

    // 売上高
    const uriagePL = findPL('売上高合計') || findPL('売上高');
    const uriageLedger = findLedger('売上高');
    if (uriagePL && uriageLedger) {
      checks.push({
        cat: 'C. 決算報告書 ↔ 総勘定元帳（売上）',
        title: '売上高（P/L）= 総勘定元帳',
        items: [
          { label: 'P/L 売上高', amount: uriagePL.amount },
          { label: '元帳 売上高（貸方累計）', amount: uriageLedger.credit },
        ],
        ok: uriagePL.amount === uriageLedger.credit,
      });
    }

    // 法人税等
    const taxPL = findPL('法人税、住民税及び事業税') || findPL('法人税');
    const taxLedger = findLedger('法人税');
    if (taxPL && taxLedger) {
      const taxNet = taxLedger.debit - taxLedger.credit;
      checks.push({
        cat: 'C. 決算報告書 ↔ 総勘定元帳（法人税等）',
        title: '法人税、住民税及び事業税（P/L）= 総勘定元帳',
        items: [
          { label: 'P/L 法人税等', amount: taxPL.amount },
          { label: '元帳 法人税等（借方累計）', amount: taxNet },
        ],
        ok: taxPL.amount === taxNet,
      });
    }
  }

  // ========================================
  // D: 決算報告書(B/S) ↔ 総勘定元帳
  // ========================================
  if (state.kessan && state.motochou) {
    const bsNameMap = {
      '売掛金': '売掛金', '預け金': '預け金',
      '車両運搬具': '車両運搬具', '長期前払費用': '長期前払費用',
      '短期借入金': '短期借入金', '未払法人税等': '未払法人税等',
    };
    const bsChecks = [];
    for (const item of state.kessan.bs) {
      if (item.name.includes('合計')) continue;
      const ledgerName = bsNameMap[item.name] || item.name;
      const ledger = findLedger(ledgerName);
      if (ledger) {
        const net = ledger.debit - ledger.credit;
        const absNet = Math.abs(net);
        const ok = item.amount === absNet || item.amount === net;
        bsChecks.push({ name: item.name, kessan: item.amount, ledgerNet: net, ok });
      }
    }
    if (bsChecks.length) {
      const allOk = bsChecks.every(d => d.ok);
      checks.push({
        cat: 'D. 決算報告書(B/S) ↔ 総勘定元帳',
        title: `B/S ${bsChecks.length}科目の照合（${bsChecks.filter(d=>d.ok).length}/${bsChecks.length} 一致）`,
        table: {
          headers: ['科目', 'B/S金額', '元帳差引残高', '差額'],
          rows: bsChecks.map(d => ({
            cells: [d.name, fmt(d.kessan), fmt(d.ledgerNet), fmt(d.kessan - Math.abs(d.ledgerNet))],
            ok: d.ok,
          })),
        },
        ok: allOk,
      });
    }
  }

  // ========================================
  // E: 科目内訳書 ↔ 総勘定元帳
  // ========================================
  if (state.uchiwake && state.motochou) {
    const uchiMap = {
      '売掛金': '売掛金', '未払法人税': '未払法人税等',
      '借入金': '短期借入金',
    };
    for (const item of state.uchiwake.filter(r => r.type === 'total')) {
      const ledgerName = uchiMap[item.form] || item.form;
      const ledger = findLedger(ledgerName);
      if (ledger) {
        const net = Math.abs(ledger.debit - ledger.credit);
        const ok = item.amount === net;
        checks.push({
          cat: 'E. 科目内訳書 ↔ 総勘定元帳',
          title: `${item.form}内訳書 合計 = 元帳 ${ledgerName}`,
          items: [
            { label: '内訳書 合計', amount: item.amount },
            { label: '元帳 残高', amount: net },
          ],
          ok,
        });
      }
    }
  }

  renderResults(checks);
}

/* ============================================================
   B/S subtotal check helper
   ============================================================ */
function checkSubtotal(checks, cat, bsItems, totalKey, componentKeys, desc) {
  const total = bsItems.find(r => r.name.includes(totalKey));
  if (!total) return;
  const components = bsItems.filter(r =>
    componentKeys.some(k => r.name.includes(k)) && !r.name.includes('合計')
  );
  if (!components.length) return;
  const sum = components.reduce((s, r) => s + r.amount, 0);
  checks.push({
    cat,
    title: `${totalKey} = 各科目の合計`,
    items: [
      ...components.map(c => ({ label: c.name, amount: c.amount })),
      { label: totalKey, amount: total.amount },
      { label: '各科目合計', amount: sum },
    ],
    ok: sum === total.amount,
  });
}

/* ============================================================
   Render Results
   ============================================================ */
function renderResults(checks) {
  const wrap = document.getElementById('check-results');
  if (!checks.length) {
    wrap.innerHTML = '<div class="loading">チェック項目がありません。PDFを2つ以上アップロードしてください。</div>';
    return;
  }

  const okCount = checks.filter(c => c.ok).length;
  const ngCount = checks.length - okCount;

  let html = '<div class="section-title">③ チェック結果</div>';
  html += '<div class="result-summary">';
  html += `<div class="result-summary-main">全${checks.length}件：✅ ${okCount}件 一致　❌ ${ngCount}件 不一致</div>`;
  html += ngCount > 0
    ? `<div class="result-pill ng">❌ ${ngCount}件 要確認</div>`
    : '<div class="result-pill ok">✅ すべて一致</div>';
  html += '</div>';

  const cats = [...new Set(checks.map(c => c.cat))];
  for (const cat of cats) {
    html += `<div class="result-category">${esc(cat)}</div>`;
    for (const c of checks.filter(x => x.cat === cat)) {
      const cls = c.ok ? 'ok' : 'ng';
      html += `<div class="check-item ${cls}">`;
      html += `<div class="check-mark ${cls}">${c.ok ? '✓' : '✗'}</div>`;
      html += '<div>';
      html += `<div class="check-title">${esc(c.title)}</div>`;

      if (c.items) {
        html += '<div class="check-detail">';
        for (const item of c.items) {
          const diff = c.items.length === 2 && item === c.items[1]
            ? c.items[0].amount - c.items[1].amount : null;
          html += `${esc(item.label)}: <strong>${fmt(item.amount)}</strong>`;
          if (diff !== null && diff !== 0) html += ` <span class="diff">（差額: ${fmt(diff)}）</span>`;
          else if (diff === 0) html += ' <span class="match">✓</span>';
          html += '<br>';
        }
        html += '</div>';
      }

      if (c.table) {
        html += '<table class="check-sub-table"><thead><tr>';
        for (const h of c.table.headers) html += `<th>${esc(h)}</th>`;
        html += '</tr></thead><tbody>';
        for (const row of c.table.rows) {
          html += row.ok ? '<tr>' : '<tr class="mismatch">';
          for (let i = 0; i < row.cells.length; i++) {
            html += i > 0 ? `<td class="num">${esc(String(row.cells[i]))}</td>` : `<td>${esc(row.cells[i])}</td>`;
          }
          html += '</tr>';
        }
        html += '</tbody></table>';
      }

      html += '</div></div>';
    }
  }

  wrap.innerHTML = html;
  wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
